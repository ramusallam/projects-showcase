<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="A running list of applications by Ramsey Musallam, built in response to real needs in the classroom." />
<title>Projects | Cycles of Learning</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="wrap">
  <p class="intro">A running list of applications my students and I are building and using to solve real pedagogical problems in the classroom. Some are elegant, some are mechanical, some are still in progress. Technology in service of the human work of teaching.</p>

  <section id="grid" class="grid" aria-live="polite" aria-busy="true">
    <p class="loading">Loading</p>
  </section>
</div>

<script>
(async function () {
  const grid = document.getElementById('grid');

  function accentFor(name) {
    const first = (name || '?').charAt(0).toUpperCase().charCodeAt(0);
    const hue = (first * 37) % 360;
    return `hsl(${hue}, 28%, 42%)`;
  }

  function renderMessage(message) {
    grid.innerHTML = '';
    const p = document.createElement('p');
    p.className = 'empty';
    p.textContent = message;
    grid.appendChild(p);
    grid.setAttribute('aria-busy', 'false');
  }

  function renderCards(projects) {
    grid.innerHTML = '';
    const sorted = [...projects].sort((a, b) =>
      a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })
    );
    const frag = document.createDocumentFragment();
    for (const p of sorted) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = p.url;
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.setProperty('--accent', accentFor(p.name));

      const glyph = document.createElement('span');
      glyph.className = 'glyph';
      glyph.textContent = (p.name || '?').charAt(0).toUpperCase();

      const hairline = document.createElement('span');
      hairline.className = 'hairline';

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = p.name;

      const reveal = document.createElement('div');
      reveal.className = 'reveal';

      const revealName = document.createElement('div');
      revealName.className = 'reveal-name';
      revealName.textContent = p.name;

      const desc = document.createElement('p');
      desc.className = 'reveal-desc';
      desc.textContent = p.description;

      reveal.appendChild(revealName);
      reveal.appendChild(desc);

      if (p.student_work) {
        const byline = document.createElement('div');
        byline.className = 'reveal-byline';
        byline.textContent = 'Student Work';
        reveal.appendChild(byline);
      }

      const cta = document.createElement('span');
      cta.className = 'reveal-cta';
      cta.textContent = 'Open';
      reveal.appendChild(cta);

      card.appendChild(glyph);
      card.appendChild(hairline);
      card.appendChild(name);
      card.appendChild(reveal);
      frag.appendChild(card);
    }
    grid.appendChild(frag);
    grid.setAttribute('aria-busy', 'false');
  }

  try {
    const res = await fetch('projects.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || !Array.isArray(data.projects) || data.projects.length === 0) {
      renderMessage('No projects yet.');
      return;
    }
    renderCards(data.projects);
  } catch (err) {
    renderMessage('Projects could not be loaded right now.');
    console.error('projects.json fetch failed:', err);
  }
})();
</script>
</body>
</html>
